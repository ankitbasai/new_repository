<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office Image</title>

  <style>
    body{
      margin:0;
      padding:0;
      background:#f4f4f4;
      font-family:Arial, sans-serif;
      text-align:center;
    }

    .container{
      margin-top:40px;
    }

    img{
      width:700px;
      max-width:90%;
      border-radius:15px;
      box-shadow:0px 0px 20px gray;
    }

    h1{
      color:#333;
      margin-bottom:20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>My Office</h1>

    <img src="office.png" alt="Office Image">

  </div>

</body>
</html>
