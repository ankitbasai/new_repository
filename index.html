<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Guiding Hand</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f2f2f2;
    }

    .poster{
      width:350px;
      height:500px;
      background:linear-gradient(to bottom,#0b5aa5,#f5d97b);
      border:4px solid #0b5aa5;
      position:relative;
      overflow:hidden;
      box-shadow:0 0 15px rgba(0,0,0,0.3);
    }

    .logo{
      width:80px;
      height:80px;
      border-radius:50%;
      background:white;
      border:5px solid #0b5aa5;
      margin:20px auto 10px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:12px;
      color:#0b5aa5;
      font-weight:bold;
      text-align:center;
    }

    .title{
      text-align:center;
      color:white;
      font-size:38px;
      font-weight:bold;
      margin-top:10px;
      text-shadow:2px 2px 4px black;
    }

    .text{
      margin-top:120px;
      padding-left:35px;
      color:red;
      font-size:34px;
      line-height:1.4;
      font-family:Georgia, serif;
    }

    .line{
      position:absolute;
      width:120%;
      height:2px;
      background:rgba(255,255,255,0.4);
      transform:rotate(-10deg);
    }

    .line1{ top:180px; left:-20px; }
    .line2{ top:230px; left:-20px; }
    .line3{ top:280px; left:-20px; }

  </style>
</head>
<body>

  <div class="poster">

    <div class="logo">
      THE<br>GUIDING<br>HAND
    </div>

    <div class="title">
      The Guiding Hand
    </div>

    <div class="line line1"></div>
    <div class="line line2"></div>
    <div class="line line3"></div>

    <div class="text">
      Build in silence...<br>
      Let your success<br>
      make the noise.
    </div>

  </div>

</body>
</html>
